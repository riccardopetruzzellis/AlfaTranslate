<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <clipPath id="ne-tri"><polygon points="0,0 200,0 200,200"/></clipPath>
    <clipPath id="sw-tri"><polygon points="0,0 0,200 200,200"/></clipPath>
    <clipPath id="nw-tri"><polygon points="0,0 200,0 0,200"/></clipPath>
    <clipPath id="se-tri"><polygon points="200,0 200,200 0,200"/></clipPath>
  </defs>

  <!-- Blue background -->
  <rect width="200" height="200" fill="#012169"/>

  <!-- St Andrew's Cross — white diagonals -->
  <polygon points="40,0 200,160 160,200 0,40" fill="white"/>
  <polygon points="160,0 200,40 40,200 0,160" fill="white"/>

  <!-- St Patrick's counterchange — red diagonal NW-SE -->
  <polygon points="40,0 13,0 200,187 200,160" fill="#C8102E" clip-path="url(#ne-tri)"/>
  <polygon points="0,40 160,200 187,200 0,13" fill="#C8102E" clip-path="url(#sw-tri)"/>
  <!-- St Patrick's counterchange — red diagonal NE-SW -->
  <polygon points="160,0 187,0 0,187 0,160" fill="#C8102E" clip-path="url(#nw-tri)"/>
  <polygon points="200,13 200,40 40,200 13,200" fill="#C8102E" clip-path="url(#se-tri)"/>

  <!-- St George's Cross — white -->
  <rect x="80" y="0" width="40" height="200" fill="white"/>
  <rect x="0" y="80" width="200" height="40" fill="white"/>

  <!-- St George's Cross — red -->
  <rect x="87" y="0" width="26" height="200" fill="#C8102E"/>
  <rect x="0" y="87" width="200" height="26" fill="#C8102E"/>

  <!-- Centre backing -->
  <rect x="56" y="44" width="88" height="100" rx="7" fill="rgba(1,33,105,0.60)"/>

  <!-- Outer frame -->
  <rect x="62" y="50" width="76" height="88" rx="4"
        fill="none" stroke="white" stroke-width="5"/>

  <!-- Script italic 'a' -->
  <text x="54" y="123"
        font-family="Georgia,'Times New Roman',serif"
        font-size="78" font-style="italic" font-weight="700"
        fill="white" stroke="#012169" stroke-width="5" paint-order="stroke fill">a</text>

  <!-- Bold 'A' -->
  <text x="89" y="122"
        font-family="'Arial Black',Impact,'Helvetica Neue',Arial,sans-serif"
        font-size="70" font-weight="900"
        fill="white" stroke="#012169" stroke-width="5" paint-order="stroke fill">A</text>
</svg>
