<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#012169" />
  <meta name="description" content="Glossario tecnico EN-IT per Finance, Real Estate e Edilizia — Gruppo Alfano S.p.A." />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AlfaTranslate" />

  <title>AlfaTranslate — Gruppo Alfano</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="app-shell">

  <!-- ── Header ─────────────────────────────────────────────────────── -->
  <header class="app-header" role="banner">
    <div class="header-top">
      <img class="header-logo"
           src="icons/icon.svg"
           alt="AlfaTranslate logo"
           width="44"
           height="44" />
      <div class="header-titles">
        <div class="header-app-name">AlfaTranslate</div>
        <div class="header-sub">Gruppo Alfano · Glossario EN-IT</div>
      </div>
    </div>
    <div class="header-flag-stripe" aria-hidden="true"></div>

    <!-- ── Search ──────────────────────────────────────────────────── -->
    <div class="search-container">
      <div class="search-wrapper" role="search">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2.2"
             stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          id="search-input"
          type="search"
          inputmode="search"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
          placeholder="Cerca in EN o IT, per definizione…"
          aria-label="Cerca termine"
        />
        <button id="clear-btn" aria-label="Cancella ricerca" title="Cancella">
          <svg width="12" height="12" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" aria-hidden="true">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- ── Category Filters ─────────────────────────────────────────── -->
    <nav class="filter-bar" role="navigation" aria-label="Filtri categoria">
      <button class="filter-btn active" data-cat="all"          aria-pressed="true">
        Tutti
      </button>
      <button class="filter-btn" data-cat="finance"             aria-pressed="false">
        💹 Finance
      </button>
      <button class="filter-btn" data-cat="realestate"          aria-pressed="false">
        🏢 Real Estate
      </button>
      <button class="filter-btn" data-cat="construction"        aria-pressed="false">
        🏗️ Edilizia
      </button>
    </nav>
  </header>

  <!-- ── Main Results ────────────────────────────────────────────────── -->
  <main class="results-area" role="main">
    <div class="results-meta">
      <span id="result-count" aria-live="polite" aria-atomic="true"></span>
      <span id="stats-summary"></span>
    </div>

    <div id="results" role="list" aria-label="Risultati">
      <!-- Cards rendered by JS -->
    </div>

    <div id="empty-state" hidden role="status">
      <span class="empty-icon" aria-hidden="true">🔍</span>
      <p>Nessun termine trovato.<br />
         Prova con un'altra parola chiave<br />
         in inglese o in italiano.</p>
    </div>
  </main>

</div><!-- /.app-shell -->

<!-- ── Overlay ──────────────────────────────────────────────────────── -->
<div id="overlay" role="presentation" aria-hidden="true"></div>

<!-- ── Detail Panel ─────────────────────────────────────────────────── -->
<aside id="detail-panel"
       role="dialog"
       aria-modal="true"
       aria-label="Dettaglio termine"
       tabindex="-1">

  <div class="detail-drag-handle" aria-hidden="true"></div>

  <div class="detail-nav">
    <button id="detail-back-nav" aria-label="Torna al termine precedente">
      <svg width="16" height="16" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round"
           aria-hidden="true">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Indietro
    </button>
    <button id="detail-close" aria-label="Chiudi">
      <svg width="16" height="16" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" aria-hidden="true">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <div class="detail-body">
    <span id="detail-badge" class="badge"></span>
    <h2 id="detail-en" class="detail-en"></h2>
    <p  id="detail-it"  class="detail-it"></p>

    <p class="detail-section-label">Definizione</p>
    <p id="detail-definition" class="detail-definition"></p>

    <p class="detail-section-label">Concetti</p>
    <div id="detail-tags"></div>

    <p class="detail-section-label">Termini correlati</p>
    <div id="detail-related"></div>
  </div>
</aside>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
  }
</script>

</body>
</html>
